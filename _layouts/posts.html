---
layout: default
---

<style>
  /* Container width */
  .post-container {
    max-width: 1100px; 
    margin: 0 auto;
    padding: 0 20px;
    box-sizing: border-box;
  }

  .post-header {
    margin-top: 4rem;
    margin-bottom: 4rem;
    border-bottom: 1px solid #eee;
    padding-bottom: 2rem;
  }
  
  .post-title {
    font-weight: 700;
    margin-bottom: 1rem;
    letter-spacing: -0.05rem;
    font-size: 3.5rem; /* Made title slightly larger */
  }

  /* --- AUTHOR ROW STYLING --- */
  .meta-label {
    font-size: 0.85rem; /* Increased from 0.75 */
    text-transform: uppercase;
    color: #555; /* Darker grey for better visibility */
    font-weight: 700;
    margin-bottom: 0.5rem;
    letter-spacing: 0.05rem;
  }

  .meta-value {
    font-size: 1.1rem; /* Increased from 0.9 to 1.1 */
    line-height: 1.4;
    font-weight: 400;
    color: #222;
  }

  /* --- CONTENTS SIDEBAR STYLING --- */
  .toc-container {
    position: -webkit-sticky;
    position: sticky;
    top: 50px;
    height: calc(100vh - 70px);
    overflow-y: auto;
    font-size: 1.2rem; /* Increased from 0.85 */
    padding-right: 10px;
    margin-top: 0.8rem;
  }

  .toc-header {
    font-weight: 700;
    margin-bottom: 1.2rem;
    font-size: 1.5rem; /* Bigger "Contents" header */
    color: #000;
  }

  #toc ul {
    list-style: none;
    margin-left: 0;
  }

  #toc li {
    margin-bottom: 0.8rem; /* More space between links */
    line-height: 1.3;
  }

  #toc a {
    text-decoration: none;
    color: #666; 
    transition: color 0.2s;
  }

  #toc a:hover {
    color: #000;
    text-decoration: underline;
  }
  
  /* --- CONTENT STYLING --- */
  .post-content {
    font-size: 1.15rem; /* Slightly larger body text */
    line-height: 1.7;
    color: #333;
  }
  
  .post-content h2 {
    margin-top: 3.5rem; 
    font-weight: 600;
  }
  
  .post-content h2:first-of-type {
    margin-top: 0;
  }

  .post-content img {
    max-width: 100%;
    border-radius: 4px;
    margin: 2rem 0;
  }

  /* Mobile: Stack columns */
  @media (max-width: 750px) {
    .toc-container {
      position: relative;
      height: auto;
      margin-bottom: 3rem;
      border-bottom: 1px solid #eee;
      padding-bottom: 2rem;
    }
  }
</style>

<div class="post-container">

  <div class="post-header">
    <div class="row">
      <div class="twelve columns">
        <h1 class="post-title">{{ page.title }}</h1>
      </div>
    </div>
    
    <div class="row" style="margin-top: 25px;">
      <div class="three columns">
        <div class="meta-label">Author</div>
        <div class="meta-value">{{ site.data.main_info.name }}</div>
      </div>
      
      <div class="four columns">
        <div class="meta-label">Affiliation</div>
        <div class="meta-value">University of Zurich</div>
      </div>

      <div class="three columns">
        <div class="meta-label">Published</div>
        <div class="meta-value">{{ page.date | date: "%B %d, %Y" }}</div>
      </div>
    </div>
  </div>

  <div class="row">
    
    <div class="three columns">
      <div class="toc-container">
        <div class="toc-header">Contents</div>
        <div id="toc"></div>
      </div>
    </div>

    <div class="nine columns">
      <div class="post-content">
        {{ content }}
      </div>
    </div>

  </div>

</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var toc = document.getElementById('toc');
  var headers = document.querySelectorAll('.post-content h2');
  
  if (headers.length > 0) {
    var ul = document.createElement('ul');
    
    headers.forEach(function(header, index) {
      if (!header.id) {
        header.id = 'section-' + index;
      }

      var li = document.createElement('li');
      var a = document.createElement('a');
      a.href = '#' + header.id;
      a.innerText = header.innerText;
      
      li.appendChild(a);
      ul.appendChild(li);
    });

    toc.appendChild(ul);
  } else {
    document.querySelector('.toc-container').style.display = 'none';
  }
});
</script>
